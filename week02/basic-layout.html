<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML Structure</title>
    <meta name="description" content="A basic HTML structure example using semantic HTMLelements">
    <meta name="author" content="Nabende Andrew Mafabi">
</head>

<body>
    <header>
        <img src="images/basic-logo.png" alt="semantic structure" width="128" height="128">
    </header>
    <nav>
        <ul>
            <li><a href="https://byui.edu">BYU-Idaho</a></li>
            <li><a href="https://churchofjesuschrist.org">The Church</a></li>
        </ul>
    </nav>
    <main>
        <h1>Basic HTML structure</h1>
        <section>
            <h2>Heading</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Natus, corrupti.</p>
        </section>
        <section>
            <h2>Heading</h2>
            <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Quidem, nostrum!</p>
        </section>
    </main>
    <aside>
        <img
          src="https://www.churchofjesuschrist.org/temples/photo-gallery/payson-utah-temple?lang=eng"
          alt="payson Utah temple" width="200">

    </aside>
    <footer>
        <p>🌴 Nabende Andrew Mafabi</p>
    </footer>

</body>

</html>
