<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nabzo Rafting Company Contact Information</title>
    <meta name="description" content="Nabzo Rafting Contact information and contact form">

<body>
    <header>
        <figure>
            <img src="images/rapids.jpg" alt="rapid logo" width="100">

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>

            </ul>

    <main>
        <div class="contact">
            <div class="contact information">
                <address>
                    <h2>Contact Information</h2>
                    <h3>Send us a message</h3>
                    <p>P.O BOX 8989 Kampala.</p>
                    <p>Phone Number:- +256771652048</p>
                    <p>Email:<a href="nmafabi@byupathway.edu">nmafabi@byupathway.edu</a> </p>
                </address>
                <img src="images/sipi-falls.jpg" alt="sipi falls" width="400">
            </div>
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3989.7596362424324!2d32.60722058116528!3d0.3107576505305503!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x177dbc7362538d37%3A0x52875ea6886b0682!2sNamuwongo%2C%20Kampala!5e0!3m2!1sen!2sug!4v1774325510038!5m2!1sen!2sug"
                  width="350" height="350" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>

            <div class="form">
                <form>
                    <fieldset>
                        <div>
                            <label for="name">NAME:-</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div>
                            <label for="email">Email:-</label>
                            <input type="email" id="email" name="email">
                        </div>
                        <div>
                            <legend><u><b>General inquiry:</b></u></legend>
                            <label for="radio">General Inquiry</label>
                            <input type="radio" id="radio" name="General Inquiry">
                        </div>
                        <div>
                            <label for="radio">Reservation Questions</label>
                            <input type="radio" id="radio" name="Reservation Questions">
                        </div>
                        <div>
                            <label for="radio">Website Suggestion</label>
                            <input type="radio" id="radio" name="website suggestions">
                        </div>
                        <div>
                            <label for="feedback"><b><u>Message Purpose:</u></b></label>
                            <textarea name="feedback" rows="4" wrap="soft"
                              placeholder="feedback">Message</textarea>
                        </div>
                        <div>
                            <label for="checkbox">Please subscribe me to the monthly
                                newsletter?</label>
                            <input type="checkbox" id="checkbox" name="checkbox">
                        </div>
                    </fieldset>
                    <button type="submit">Get in Touch!</button>
                </form>
            </div>
        </div>
        </section>
        </div>

        <div class="hero">
            <section class="adventure">
                <h2>"Adventure Awaits You!"</h2>
                <figure>
                    <img src="images/sipi-falls.jpg" alt="sipi falls rafting">
                    <figcaption>Sipi Rafting</figcaption>

                </figure>
                <figure>
                    <img src="images/nilerafting.jpg" alt="nile rafting">
                    <figcaption>Nile Raftingr</figcaption>
                </figure>
                <figure>
                    <img src="images/rafting-fall21.jpg" alt="bujagali rafting">
                    <figcaption>Bujagil rafting</figcaption>
                </figure>
                <figure>
                    <img src="images/adventure-safari.jpg" alt="murchison fall">
                    <figcaption>Murchison Raft</figcaption>
                </figure>
                <figure>
                    <img src="images/rafting-falls31.jpg" alt="calm waters">
                    <figcaption>calm waters</figcaption>
                </figure>
            </section>
        </div>
