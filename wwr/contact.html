<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us at Nabzo Rafting Company Limited</title>
    <meta name="description" content="Nabzo Rafting Contact information and contact form">
    <meta name="author" content="Nabende Andrew Mafabi">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <figure>
            <img src="images/rapids.jpg" alt="rapid logo" width="100">
        </figure>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="contact">
            <div class="contact information">
                <h1>Contact Information👉</h1>
                <div>
                    <h2>Send us a message on:-</h2>
                    <address>
                        <p>P.O BOX 8989 Kampala.</p>
                        <p>Phone Number:- +256771652048</p>
                        <p>Email:<a href="nmafabi@byupathway.edu">NabzoRafting company Email</a>
                    </address>
                </div>
                <img src="images/sipi-falls.jpg" alt="sipi falls" width="400">
            </div>
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3989.7596362424324!2d32.60722058116528!3d0.3107576505305503!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x177dbc7362538d37%3A0x52875ea6886b0682!2sNamuwongo%2C%20Kampala!5e0!3m2!1sen!2sug!4v1774325510038!5m2!1sen!2sug"
                  width="350" height="350" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>

            <div class="form">
                <form action="nmafabi@byupathway.edu">
                    <fieldset>
                        <div>
                            <label for="name">NAME:-</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div>
                            <label for="email">Email:-</label>
                            <input type="email" id="email" name="email">
                        </div>
                        <div>
                            <p><u><b>General inquiry:-</b></u></p>
                            <label for="General">General Inquiry</label>
                            <input type="radio" id="General" name="radio">
                        </div>
                        <div>
                            <label for="reservations">Reservation Questions</label>
                            <input type="radio" id="reservations" name="radio">
                        </div>
                        <div>
                            <label for="website">Website Suggestion</label>
                            <input type="radio" id="website" name="radio">
                        </div>
                        <div>
                            <label for="textarea"><b><u>Message Purpose:</u></b></label>
                            <textarea id="textarea" name="textarea" rows="4" wrap="soft"
                              placeholder="feedback">Message</textarea>
                        </div>
                        <div>
                            <label for="subscribe">Please subscribe me to the monthly
                                newsletter?</label>
                            <input type="checkbox" id="subscribe" name="subscribe">
                        </div>
                    </fieldset>
                    <button type="submit">Submit!</button>
                </form>
            </div>
        </div>


        <div class="hero">
            <section class="service">
                <h2>"What are here to serve you"</h2>
                <figure class="ceo">
                    <img src="images/ceo.jpg" alt="sipi falls rafting">
                    <figcaption>C.E.O- Andrew</figcaption>

                </figure>
                <figure class="director">
                    <img src="images/assistant-director.webp" alt="bujagali rafting">
                    <figcaption>DIRECTOR - Flavia</figcaption>
                </figure>
                <figure class="assdirector">
                    <img src="images/director.jfif" alt="calm waters">
                    <figcaption>ASS-DIRECTOR - Allan</figcaption>
                </figure>
            </section>
        </div>
    </main>
    <footer>
        <p>©2026 Nabzo Rafting Company Limited. 🌴 by Nabende Andrew Mafabi</p>
        <nav class="socialmedia">
            <a href="https://facebook.com"><img src="images/facebook.jpg" alt="Facebook Icon"
                  width="30" height="30"></a>
            <a href="https://linkedIn.com"><img src="images/linkedin.jpg" alt="LinkedIn Icon"
                  width="30" height="30"></a>
            <a href="https://Instagram.com"><img src="images/instagram.jpg" alt="Instagram Icon"
                  width="30" height="30"></a>
        </nav>

    </footer>

</body>

</html>
